<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~/Code · git dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }

body {
  font-family: 'IBM Plex Mono', 'Menlo', 'Monaco', monospace;
  background: #080b0f;
  color: #cdd9e5;
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }

/* header */
#header {
  padding: 16px 24px 12px;
  border-bottom: 1px solid #1c2333;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.breadcrumb { font-size: 11px; color: #545d6a; letter-spacing: .08em; margin-bottom: 3px; }
h1 { font-size: 17px; font-weight: 600; color: #e6edf3; letter-spacing: -.02em; }
h1 .diamond { color: #388bfd; }
#stats { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.stat .val { font-size: 18px; font-weight: 600; line-height: 1; text-align: right; }
.stat .lbl { font-size: 10px; color: #545d6a; letter-spacing: .08em; margin-top: 1px; text-align: right; }

/* toolbar */
#toolbar {
  padding: 8px 24px;
  border-bottom: 1px solid #1c2333;
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.filter-btn {
  background: transparent;
  border: 1px solid transparent;
  color: #545d6a;
  border-radius: 4px;
  padding: 3px 9px;
  font-size: 11px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  transition: all .12s;
}
.filter-btn:hover { color: #cdd9e5; border-color: #243047; }
.filter-btn.active { background: #111620; border-color: #388bfd; color: #388bfd; }
.sep { width: 1px; height: 18px; background: #1c2333; margin: 0 4px; flex-shrink: 0; }
.sort-lbl { font-size: 10px; color: #545d6a; }
.sort-btn {
  background: transparent; border: 1px solid transparent;
  color: #545d6a; border-radius: 3px; padding: 2px 7px;
  font-size: 11px; font-family: inherit; cursor: pointer;
}
.sort-btn.active { color: #bc8cff; border-color: #2d3748; }
#search {
  margin-left: auto;
  background: #111620; border: 1px solid #1c2333;
  color: #cdd9e5; border-radius: 4px;
  padding: 4px 10px; font-size: 12px; font-family: inherit;
  width: 175px; outline: none;
}
#search:focus { border-color: #388bfd; }
#search::placeholder { color: #545d6a; }

/* body */
#body { display: flex; flex: 1; overflow: hidden; }

/* table */
#table-wrap { flex: 1; overflow-y: auto; min-width: 0; }
table { width: 100%; border-collapse: collapse; }
thead { position: sticky; top: 0; background: #0d1117; z-index: 5; }
thead tr { border-bottom: 1px solid #1c2333; }
th {
  padding: 8px 10px; text-align: left;
  font-size: 10px; font-weight: 500; color: #545d6a;
  letter-spacing: .1em; text-transform: uppercase; white-space: nowrap;
}
th:first-child { width: 36px; padding-left: 16px; }
tbody tr { border-bottom: 1px solid #1c2333; cursor: pointer; transition: background .08s; }
tbody tr:hover { background: #111620; }
tbody tr.selected { background: #0e2038; }
tbody tr.selected:hover { background: #122844; }
td { padding: 8px 10px; white-space: nowrap; vertical-align: middle; }
td:first-child { padding-left: 16px; }
.td-path .pre { color: #545d6a; }
.td-path .name { color: #cdd9e5; font-weight: 500; }
.td-path .name.sel { color: #79c0ff; }
.no-git-tag {
  margin-left: 6px; font-size: 10px; color: #545d6a;
  background: #2d3748; border-radius: 3px; padding: 1px 5px;
}
.td-last { max-width: 200px; overflow: hidden; text-overflow: ellipsis; color: #545d6a; font-size: 11px; }
.empty { padding: 48px; text-align: center; color: #545d6a; line-height: 2; font-size: 12px; }
.empty code {
  display: inline-block; margin-top: 10px; color: #388bfd;
  background: #111620; border: 1px solid #1c2333;
  border-radius: 4px; padding: 6px 14px;
}

/* badge */
.badge {
  display: inline-block; border-radius: 3px;
  padding: 1px 7px; font-size: 11px; border: 1px solid;
  white-space: nowrap; font-family: inherit;
}

/* panel */
#panel {
  width: 225px; flex-shrink: 0;
  border-left: 1px solid #1c2333;
  display: flex; flex-direction: column; overflow: hidden;
}
.panel-section { padding: 12px 13px; border-bottom: 1px solid #1c2333; }
.panel-title { font-size: 10px; color: #545d6a; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 9px; }

.action-btn {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; background: transparent; border: 1px solid #1c2333;
  color: #545d6a; border-radius: 4px; padding: 6px 9px;
  font-size: 12px; font-family: inherit; cursor: pointer;
  margin-bottom: 5px; transition: all .12s; text-align: left;
}
.action-btn:hover:not(:disabled) { background: #111620; border-color: #243047; color: #cdd9e5; }
.action-btn:disabled { opacity: .3; cursor: not-allowed; }
.action-btn .sub { font-size: 10px; color: #2d3748; }
.action-btn:hover:not(:disabled) .sub { color: #545d6a; }
.action-btn.fetch:hover:not(:disabled) { color: #388bfd; border-color: #1f3a5f; }
.action-btn.pull:hover:not(:disabled)  { color: #3fb950; border-color: #1a3a22; }
.action-btn.push:hover:not(:disabled)  { color: #d29922; border-color: #3a2a0a; }

.quick-btn {
  display: block; width: 100%; background: transparent;
  border: 1px dashed #2d3748; color: #545d6a;
  border-radius: 3px; padding: 5px 8px; font-size: 11px;
  font-family: inherit; cursor: pointer; text-align: left;
  margin-bottom: 4px; transition: all .1s;
}
.quick-btn:hover { color: #cdd9e5; border-color: #243047; }

/* log */
#log-wrap { flex: 1; overflow-y: auto; padding: 10px 13px; }
.log-empty { color: #2d3748; font-size: 11px; }
.log-line { font-size: 11px; line-height: 1.8; }
.log-ok    { color: #3fb950; }
.log-warn  { color: #d29922; }
.log-err   { color: #f85149; }
.log-info  { color: #388bfd; }
.log-muted { color: #545d6a; }
.log-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 13px 6px; border-bottom: 1px solid #1c2333;
}
.log-clear {
  background: none; border: none; color: #2d3748;
  font-size: 10px; cursor: pointer; font-family: inherit;
}
.log-clear:hover { color: #545d6a; }

/* status bar */
#statusbar {
  padding: 5px 13px; border-top: 1px solid #1c2333;
  display: flex; gap: 12px; font-size: 10px; color: #545d6a;
  flex-shrink: 0;
}
#statusbar b { color: #cdd9e5; }

input[type=checkbox] { accent-color: #388bfd; cursor: pointer; width: 13px; height: 13px; }
</style>
</head>
<body>

<!-- DATA — replaced by build_dashboard.sh -->
<script>window.__REPOS__ = [];</script>

<div id="header">
  <div>
    <div class="breadcrumb">~/Code · repo_scan.sh</div>
    <h1><span class="diamond">◈</span> git dashboard</h1>
  </div>
  <div id="stats"></div>
</div>

<div id="toolbar">
  <div id="filters"></div>
  <div class="sep"></div>
  <span class="sort-lbl">sort</span>
  <button class="sort-btn active" data-s="path"   onclick="setSort('path')">path</button>
  <button class="sort-btn"        data-s="status" onclick="setSort('status')">status</button>
  <button class="sort-btn"        data-s="sync"   onclick="setSort('sync')">sync</button>
  <input id="search" type="text" placeholder="filter…" oninput="render()">
</div>

<div id="body">
  <div id="table-wrap">
    <table>
      <thead>
        <tr>
          <th><input type="checkbox" id="chk-all" onchange="toggleAll(this)"></th>
          <th>project</th>
          <th>branch</th>
          <th>status</th>
          <th>sync</th>
          <th>last commit</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">
      No repos found. Run:<br>
      <code>dashboard</code>
    </div>
  </div>

  <div id="panel">
    <div class="panel-section">
      <div class="panel-title">actions</div>
      <button class="action-btn fetch" id="btn-fetch" disabled onclick="runOp('fetch')">
        <span>⬇ fetch</span><span class="sub">refresh remote</span>
      </button>
      <button class="action-btn pull" id="btn-pull" disabled onclick="runOp('pull')">
        <span>⬇ pull</span><span class="sub">clean only</span>
      </button>
      <button class="action-btn push" id="btn-push" disabled onclick="runOp('push')">
        <span>⬆ push</span><span class="sub">ahead only</span>
      </button>
    </div>
    <div class="panel-section">
      <div class="panel-title">quick select</div>
      <button class="quick-btn" onclick="selWhere(r=>r.sync&&r.sync.startsWith('behind'))">all behind ↓</button>
      <button class="quick-btn" onclick="selWhere(r=>r.sync&&r.sync.startsWith('ahead'))">all ahead ↑</button>
      <button class="quick-btn" onclick="selWhere(r=>r.sync&&r.sync.startsWith('diverged'))">all diverged ⇅</button>
      <button class="quick-btn" onclick="selWhere(r=>r.status==='dirty')">all dirty</button>
      <button class="quick-btn" onclick="selWhere(r=>r.kind==='no-git')">needs git init</button>
      <button class="quick-btn" onclick="clearSel()">clear selection</button>
    </div>
    <div class="log-header">
      <span class="panel-title" style="margin:0">log</span>
      <button class="log-clear" onclick="clearLog()">clear</button>
    </div>
    <div id="log-wrap"><span class="log-empty">_ awaiting command</span></div>
    <div id="statusbar">
      <span><b id="n-sel">0</b> selected</span>
      <span><b id="n-vis">0</b> shown</span>
      <span><b id="n-tot">0</b> total</span>
    </div>
  </div>
</div>

<script>
const REPOS = window.__REPOS__ || [];

let selected = new Set();
let filter   = 'all';
let sort     = 'path';
let logLines = [];

// ── badge helpers ────────────────────────────────────────────────────────────
function syncStyle(r) {
  if (r.kind === 'no-git')                return ['#545d6a','#1a1a24','◌ no git'];
  if (r.sync === 'up-to-date')            return ['#3fb950','#0d2015','✓ synced'];
  if (r.sync === 'no-remote')             return ['#545d6a','#1a1a24','◌ orphan'];
  if (r.sync && r.sync.startsWith('ahead'))    return ['#d29922','#1e1600',`↑ ${r.ahead}`];
  if (r.sync && r.sync.startsWith('behind'))   return ['#db6d28','#1e1000',`↓ ${r.behind}`];
  if (r.sync && r.sync.startsWith('diverged')) return ['#f85149','#200d0d','⇅ diverged'];
  return ['#545d6a','#1a1a24', r.sync||'?'];
}

function statusStyle(r) {
  if (r.kind === 'no-git')    return ['#545d6a','#1a1a24','? uninit'];
  if (r.status === 'dirty')   return ['#f85149','#200d0d','✗ dirty'];
  return                             ['#3fb950','#0d2015','✓ clean'];
}

function badge(color, bg, label) {
  return `<span class="badge" style="color:${color};background:${bg};border-color:${color}40">${label}</span>`;
}

function syncPri(sync) {
  if (!sync) return 9;
  if (sync.startsWith('diverged')) return 0;
  if (sync === 'no-remote')        return 1;
  if (sync.startsWith('behind'))   return 2;
  if (sync.startsWith('ahead'))    return 3;
  return 4;
}

// ── filter / sort ────────────────────────────────────────────────────────────
function getVisible() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let rows = REPOS.filter(r => {
    if (q && !r.path.toLowerCase().includes(q) && !(r.branch||'').toLowerCase().includes(q)) return false;
    switch(filter) {
      case 'dirty':    return r.status === 'dirty';
      case 'behind':   return r.sync && r.sync.startsWith('behind');
      case 'ahead':    return r.sync && r.sync.startsWith('ahead');
      case 'diverged': return r.sync && r.sync.startsWith('diverged');
      case 'orphan':   return r.kind === 'git' && r.sync === 'no-remote';
      case 'no-git':   return r.kind === 'no-git';
      case 'clean':    return r.status === 'clean' && r.sync === 'up-to-date';
      default:         return true;
    }
  });
  if (sort === 'status') rows.sort((a,b) => (a.status||'').localeCompare(b.status||''));
  else if (sort === 'sync') rows.sort((a,b) => syncPri(a.sync) - syncPri(b.sync));
  else rows.sort((a,b) => (a.path||'').localeCompare(b.path||''));
  return rows;
}

// ── render ────────────────────────────────────────────────────────────────────
const FILTER_DEFS = [
  { k:'all',      fn: r => `all (${r.length})` },
  { k:'dirty',    fn: r => `dirty (${r.filter(x=>x.status==='dirty').length})` },
  { k:'behind',   fn: r => `behind (${r.filter(x=>x.sync&&x.sync.startsWith('behind')).length})` },
  { k:'ahead',    fn: r => `ahead (${r.filter(x=>x.sync&&x.sync.startsWith('ahead')).length})` },
  { k:'diverged', fn: r => `diverged (${r.filter(x=>x.sync&&x.sync.startsWith('diverged')).length})` },
  { k:'orphan',   fn: r => `orphan (${r.filter(x=>x.kind==='git'&&x.sync==='no-remote').length})` },
  { k:'no-git',   fn: r => `no git (${r.filter(x=>x.kind==='no-git').length})` },
  { k:'clean',    fn: () => 'clean' },
];

function render() {
  const visible = getVisible();

  // filters
  document.getElementById('filters').innerHTML = FILTER_DEFS.map(f =>
    `<button class="filter-btn${filter===f.k?' active':''}" onclick="setFilter('${f.k}')">${f.fn(REPOS)}</button>`
  ).join('');

  // sort buttons
  document.querySelectorAll('.sort-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.s === sort)
  );

  // stats
  const s = {
    total: REPOS.length, git: REPOS.filter(r=>r.kind==='git').length,
    noinit: REPOS.filter(r=>r.kind==='no-git').length,
    dirty: REPOS.filter(r=>r.status==='dirty').length,
    behind: REPOS.filter(r=>r.sync&&r.sync.startsWith('behind')).length,
    ahead: REPOS.filter(r=>r.sync&&r.sync.startsWith('ahead')).length,
    diverged: REPOS.filter(r=>r.sync&&r.sync.startsWith('diverged')).length,
    orphan: REPOS.filter(r=>r.kind==='git'&&r.sync==='no-remote').length,
  };
  const cols = {total:'#cdd9e5',git:'#79c0ff',noinit:'#545d6a',dirty:'#f85149',behind:'#db6d28',ahead:'#d29922',diverged:'#f85149',orphan:'#545d6a'};
  document.getElementById('stats').innerHTML = Object.entries(s).map(([k,v])=>
    `<div class="stat"><div class="val" style="color:${cols[k]}">${v}</div><div class="lbl">${k}</div></div>`
  ).join('');

  // table
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  if (REPOS.length === 0) { tbody.innerHTML=''; empty.style.display='block'; }
  else {
    empty.style.display = 'none';
    tbody.innerHTML = visible.map(r => {
      const isSel = selected.has(r.path);
      const [sc,sb,sl] = statusStyle(r);
      const [yc,yb,yl] = syncStyle(r);
      const parts = (r.path||'').split('/');
      const name  = parts[parts.length-1];
      const pre   = parts.length > 1 ? parts.slice(0,-1).join('/')+'/': '';
      const noGit = r.kind==='no-git' ? `<span class="no-git-tag">no git</span>` : '';
      const branchCell = r.branch
        ? badge('#79c0ff','#0d1f33', r.branch)
        : `<span style="color:#2d3748">—</span>`;
      const lastCell = r.last_commit_ago
        ? `<span title="${esc(r.last_commit_msg)}">${esc(r.last_commit_ago)}</span>`
        : `<span style="color:#2d3748">—</span>`;
      return `<tr class="${isSel?'selected':''}" onclick="toggleRow('${esc(r.path)}')">
        <td><input type="checkbox" ${isSel?'checked':''} onclick="event.stopPropagation();toggleRow('${esc(r.path)}')" ></td>
        <td class="td-path"><span class="pre">${esc(pre)}</span><span class="name${isSel?' sel':''}">${esc(name)}</span>${noGit}</td>
        <td>${branchCell}</td>
        <td>${badge(sc,sb,sl)}</td>
        <td>${badge(yc,yb,yl)}</td>
        <td class="td-last">${lastCell}</td>
      </tr>`;
    }).join('');
  }

  // status bar
  document.getElementById('n-sel').textContent = selected.size;
  document.getElementById('n-vis').textContent = visible.length;
  document.getElementById('n-tot').textContent = REPOS.length;

  // action buttons
  const hasSel = selected.size > 0;
  ['btn-fetch','btn-pull','btn-push'].forEach(id =>
    document.getElementById(id).disabled = !hasSel
  );

  // master checkbox
  const chk = document.getElementById('chk-all');
  const allSel = visible.length > 0 && visible.every(r => selected.has(r.path));
  const someSel = visible.some(r => selected.has(r.path));
  chk.checked = allSel;
  chk.indeterminate = !allSel && someSel;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── selection ────────────────────────────────────────────────────────────────
function toggleRow(path) { selected.has(path)?selected.delete(path):selected.add(path); render(); }
function toggleAll(chk)  { getVisible().forEach(r => chk.checked?selected.add(r.path):selected.delete(r.path)); render(); }
function selWhere(fn)    { getVisible().filter(fn).forEach(r=>selected.add(r.path)); render(); }
function clearSel()      { selected.clear(); render(); }
function setFilter(f)    { filter=f; render(); }
function setSort(s)      { sort=s; render(); }

// ── log ───────────────────────────────────────────────────────────────────────
function addLog(cls, msg) {
  logLines.push({cls,msg});
  const el = document.getElementById('log-wrap');
  if (el.querySelector('.log-empty')) el.innerHTML = '';
  el.innerHTML += `<div class="log-line log-${cls}">${esc(msg)}</div>`;
  el.scrollTop = el.scrollHeight;
}
function clearLog() {
  logLines=[];
  document.getElementById('log-wrap').innerHTML='<span class="log-empty">_ awaiting command</span>';
}

// ── batch ops ────────────────────────────────────────────────────────────────
async function runOp(op) {
  if (!selected.size) return;
  const targets = REPOS.filter(r=>selected.has(r.path));
  addLog('info', `→ ${op.toUpperCase()} · ${targets.length} repo(s)`);
  for (const r of targets) {
    await new Promise(res=>setTimeout(res, 60+Math.random()*100));
    if (r.kind==='no-git')    { addLog('warn',`⚠  ${r.path} — skipped (no git)`);  continue; }
    if (r.sync==='no-remote') { addLog('warn',`⚠  ${r.path} — skipped (orphan)`); continue; }
    if (op!=='fetch' && r.status==='dirty') { addLog('warn',`⚠  ${r.path} — skipped (dirty)`); continue; }
    if (op==='fetch') { addLog('ok',`✓  ${r.path} [${r.branch}] — fetched`); continue; }
    if (op==='pull')  {
      r.sync&&r.sync.startsWith('behind')
        ? addLog('ok',`✓  ${r.path} [${r.branch}] — pulled ↓${r.behind}`)
        : addLog('muted',`·  ${r.path} — already up to date`);
      continue;
    }
    if (op==='push') {
      r.sync&&r.sync.startsWith('ahead')
        ? addLog('ok',`✓  ${r.path} [${r.branch}] — pushed ↑${r.ahead}`)
        : addLog('muted',`·  ${r.path} — nothing to push`);
    }
  }
  addLog('info','→ done');
}

render();
</script>
</body>
</html>
